# Correct true color support
set-option -sa terminal-overrides ",xterm*:Tc"

# Core behavior
set -g mouse on
set -g status on
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start panes/windows in 1 for easier navigation
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1

# Pane movement shortcuts
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt-vim movement without prefix
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# Resize panes
bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10

# Split pane keeping current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Window behavior
set -g renumber-windows on
bind -n M-H previous-window
bind -n M-L next-window
set -sg escape-time 0

# Reload config
# Atajo: prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config Reloaded!"

# Quick color/theme controls
# Atajo: prefix + T (alterna entre Tokyo Night Storm y Nord para comparar)
bind T if-shell -F '#{==:#{@thm_bg},#1f2335}' \
  "source-file ~/.config/tmux/themes/nord.conf; display 'Theme preview: Nord'" \
  "source-file ~/.config/tmux/themes/tokyo-night-storm.conf; display 'Theme preview: Tokyo Night Storm'"

# Theme autodetection: WSL -> Tokyo Night Storm, Linux -> Nord
if-shell 'test -n "$WSL_DISTRO_NAME" || grep -qi microsoft /proc/sys/kernel/osrelease 2>/dev/null || grep -qi microsoft /proc/version 2>/dev/null' \
  "set -g @machine_label WSL; source-file ~/.config/tmux/themes/tokyo-night-storm.conf" \
  "set -g @machine_label LINUX; source-file ~/.config/tmux/themes/nord.conf"

# Native status line (powerline style)
set -g status-position top
set -g status-justify left
set -g status-left-length 30
set -g status-right-length 80
set -g status-style "fg=#{@thm_fg},bg=#{@thm_bg}"
set -g status-left "#[fg=#{@thm_session_fg},bg=#{@thm_session_bg},bold] #S #[fg=#{@thm_session_bg},bg=#{@thm_bg}]"
set -g status-right "#[fg=#{@thm_right_bg},bg=#{@thm_bg}]#[fg=#{@thm_right_fg},bg=#{@thm_right_bg}] %Y-%m-%d %H:%M #[fg=#{@thm_machine_bg},bg=#{@thm_right_bg}]#[fg=#{@thm_machine_fg},bg=#{@thm_machine_bg},bold] #{@machine_label} "

setw -g window-status-separator ""
setw -g window-status-format "#[fg=#{@thm_bg},bg=#{@thm_win_inactive_bg}]#[fg=#{@thm_win_inactive_fg},bg=#{@thm_win_inactive_bg}] #I #W #{?window_flags,#{window_flags},}#[fg=#{@thm_win_inactive_bg},bg=#{@thm_bg}]"
setw -g window-status-current-format "#[fg=#{@thm_bg},bg=#{@thm_win_active_bg}]#[fg=#{@thm_win_active_fg},bg=#{@thm_win_active_bg},bold] #I #W #[fg=#{@thm_win_active_bg},bg=#{@thm_bg}]"

# Pane borders and messages
set -g pane-border-style "fg=#{@thm_pane_inactive}"
set -g pane-active-border-style "fg=#{@thm_pane_active}"
set -g message-style "fg=#{@thm_msg_fg},bg=#{@thm_msg_bg},bold"
set -g mode-style "fg=#{@thm_mode_fg},bg=#{@thm_mode_bg},bold"

# Copy mode vi bindings
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Session switcher popup
# Atajo: prefix + C-j (selector de sesiones con fzf)
bind C-j display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect / Continuum
# Atajos del plugin:
# - prefix + Ctrl-s  -> guardar sesion
# - prefix + Ctrl-r  -> restaurar sesion
# - prefix + I       -> instalar/actualizar plugins con TPM
set -g @resurrect-dir '~/.local/share/tmux/resurrect'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run '~/.config/tmux/plugins/tpm/tpm'
